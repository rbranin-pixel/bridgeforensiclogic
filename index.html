<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Bridge</title>

<style>
:root {
  --bg: #0b0b0b;
  --fg: #d6b16a;
  --fg-dim: rgba(214,177,106,0.65);
  --line: #6f5829;
  --line-bright: rgba(212,175,55,0.4);
}

html, body {
  margin: 0;
  padding: 0;
  background: var(--bg);
  color: var(--fg);
  font-family: Garamond, serif;
  text-align: center;
}

body {
  padding: 100px 20px;
}

/* FLICKER EFFECT */
body.flicker {
  animation: flicker 0.4s linear;
}

@keyframes flicker {
  0% { opacity: 1; }
  20% { opacity: 0.6; }
  40% { opacity: 1; }
  60% { opacity: 0.4; }
  80% { opacity: 1; }
  100% { opacity: 1; }
}

.wrap {
  max-width: 760px;
  margin: 0 auto;
}

h1 {
  font-size: 3rem;
  letter-spacing: 0.15em;
  font-weight: normal;
}

h2 {
  margin-top: 2.5rem;
  font-size: 1rem;
  letter-spacing: 0.12em;
  font-weight: normal;
}

p {
  margin: 0.5rem 0;
}

.subtle {
  color: var(--fg-dim);
}

.line {
  margin: 2.5rem auto;
  width: 200px;
  height: 1px;
  background: var(--line);
}

.button, .action {
  display: inline-block;
  margin-top: 2rem;
  padding: 12px 24px;
  border: 1px solid var(--fg);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  cursor: pointer;
  background: none;
  color: var(--fg);
}

.button:hover, .action:hover {
  opacity: 0.7;
}

#access-panel {
  max-width: 500px;
  margin: 2rem auto 0;
  opacity: 0;
  transform: translateY(10px);
  transition: all 0.6s ease;
  pointer-events: none;
  max-height: 0;
  overflow: hidden;
}

#access-panel.visible {
  opacity: 1;
  transform: translateY(0);
  pointer-events: auto;
  max-height: 1000px;
}

.channel {
  margin-top: 1rem;
  padding: 0.8rem 0;
  border-top: 1px solid var(--line-bright);
  border-bottom: 1px solid var(--line-bright);
  word-break: break-word;
}

.actions {
  margin-top: 1.2rem;
}

.action {
  margin: 0 5px;
}

#status {
  margin-top: 1rem;
  min-height: 1.5rem;
  color: var(--fg-dim);
  letter-spacing: 0.08em;
  transition: opacity 0.3s ease;
}
</style>
</head>

<body>

<div class="wrap">
  <h1>THE BRIDGE</h1>
  <p class="subtle">BridgeForensicLogic, LLC</p>
  <p class="subtle">bridge@bridgeforensiclogic.com</p>

  <div class="line"></div>

  <h2>NODE 001 — BASELINE</h2>
  <p>Baseline established. Noise reduced.</p>

  <button class="button" onclick="revealAccess()">REQUEST ACCESS</button>

  <div id="access-panel">
    <div class="channel" id="channel-email">
      contact@bridgeforensiclogic.com
    </div>

    <div class="actions">
      <button class="action" onclick="copyChannel()">COPY CHANNEL</button>
      <a class="action" href="mailto:contact@bridgeforensiclogic.com?subject=Request%20Access">TRANSMIT</a>
    </div>

    <div id="status"></div>
  </div>
</div>

<script>
function revealAccess() {
  const panel = document.getElementById('access-panel');
  const status = document.getElementById('status');

  // flicker pulse
  document.body.classList.add('flicker');
  setTimeout(() => {
    document.body.classList.remove('flicker');
  }, 400);

  status.textContent = "REQUEST RECEIVED";

  setTimeout(() => {
    status.textContent = "EVALUATING SIGNAL";
  }, 600);

  setTimeout(() => {
    panel.classList.add('visible');
    status.textContent = "CHANNEL AVAILABLE";
  }, 1400);
}

function copyChannel() {
  const email = document.getElementById('channel-email').textContent;
  const status = document.getElementById('status');

  navigator.clipboard.writeText(email).then(() => {
    status.textContent = "CHANNEL ACQUIRED";

    setTimeout(() => {
      status.textContent = "AWAITING TRANSMISSION";
    }, 1200);
  }).catch(() => {
    status.textContent = "TRANSMISSION ERROR";
  });
}
</script>

</body>
</html>
