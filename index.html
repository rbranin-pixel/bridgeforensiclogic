<!DOCTYPE html>
<html>
<head>
  <title>The Bridge</title>
  <style>
   a,
a:visited,
a:hover,
a:active,
a.button,
a.button:visited,
a.button:hover,
a.button:active {
  color: #d4af37 !important;
  text-decoration: none !important;
}
    a {
  color: #d4af37;          /* your gold */
  text-decoration: none;
}

a:visited {
  color: #d4af37;
}

a:hover {
  opacity: 0.7;
}

a:active {
  color: #d4af37;
}
    body {
      background: #0b0b0b;
      color: #d6b16a;
      font-family: Garamond, serif;
      text-align: center;
      padding: 100px 20px;
    }
    h1 { font-size: 48px; }
    .line { margin: 40px auto; width: 200px; height: 1px; background: #6f5829; }
    .button {
      margin-top: 40px;
      padding: 12px 24px;
      border: 1px solid #c9a35a;
      display: inline-block;
    }
  </style>
</head>
<body>

  <h1>THE BRIDGE</h1>
  <p>BridgeForensicLogic, LLC</p>
  <p>bridge@bridgeforensiclogic.com</p>

  <div class="line"></div>

  <h2>NODE 001 — BASELINE</h2>
  <p>Baseline established. Noise reduced.</p>

<a class="button" href="#" onclick="document.getElementById('access-form').style.display='block'; return false;">REQUEST ACCESS</a>
<div id="access-form" style="display:none; margin-top: 2rem;">
  <form action="https://formsubmit.co/contact@bridgeforensiclogic.com" method="POST">
    <input type="hidden" name="_subject" value="Request Access">
    <input type="hidden" name="_captcha" value="false">

    <div style="margin-bottom: 1rem;">
      <input type="text" name="name" placeholder="Name" required style="width: 100%; padding: 0.75rem;">
    </div>

    <div style="margin-bottom: 1rem;">
      <input type="email" name="email" placeholder="Email" required style="width: 100%; padding: 0.75rem;">
    </div>

    <div style="margin-bottom: 1rem;">
      <textarea name="message" placeholder="Message" rows="5" required style="width: 100%; padding: 0.75rem;"></textarea>
    </div>

    <button type="submit">Transmit</button>
  </form>
</div>
</body>
</html>
