<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Bridge</title>
  <style>
    :root {
      --bg: #0b0b0b;
      --fg: #d6b16a;
      --fg-dim: rgba(214, 177, 106, 0.65);
      --line: #6f5829;
      --line-bright: rgba(212, 175, 55, 0.4);
      --line-focus: #d4af37;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: Garamond, Georgia, serif;
    }

    body {
      text-align: center;
      padding: 100px 20px;
    }

    .wrap {
      max-width: 760px;
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 0.75rem;
      font-size: clamp(2.5rem, 6vw, 3.5rem);
      letter-spacing: 0.14em;
      font-weight: normal;
    }

    h2 {
      margin: 2.5rem 0 0.75rem;
      font-size: 1.1rem;
      letter-spacing: 0.12em;
      font-weight: normal;
    }

    p {
      margin: 0.5rem 0;
      font-size: 1rem;
      line-height: 1.6;
      color: var(--fg);
    }

    .subtle {
      color: var(--fg-dim);
      letter-spacing: 0.06em;
    }

    .line {
      margin: 2.5rem auto;
      width: 220px;
      height: 1px;
      background: var(--line);
    }

    a,
    a:visited,
    a:hover,
    a:active {
      color: var(--fg);
      text-decoration: none;
    }

    .button {
      display: inline-block;
      margin-top: 2rem;
      padding: 12px 24px;
      border: 1px solid var(--fg);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      transition: opacity 0.3s ease, border-color 0.3s ease;
      cursor: pointer;
      user-select: none;
    }

    .button:hover {
      opacity: 0.72;
    }

    #access-panel {
      max-width: 440px;
      margin: 2.25rem auto 0;
      text-align: left;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.7s ease, transform 0.7s ease;
      pointer-events: none;
      max-height: 0;
      overflow: hidden;
    }

    #access-panel.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
      max-height: 1000px;
    }

    .field {
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.55s ease, transform 0.55s ease;
      margin-bottom: 1.25rem;
      color: var(--fg);
    }

    .field.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .label {
      color: var(--fg-dim);
      letter-spacing: 0.08em;
      font-size: 0.85rem;
      text-transform: uppercase;
      margin-bottom: 0.35rem;
    }

    .value {
      border-bottom: 1px solid var(--line-bright);
      padding: 0.6rem 0;
      word-break: break-word;
      font-size: 0.98rem;
    }

    .action-link {
      display: inline-block;
      margin-top: 0.25rem;
      border-bottom: 1px solid var(--line-bright);
      padding-bottom: 2px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-size: 0.92rem;
    }

    @media (max-width: 640px) {
      body {
        padding: 72px 18px;
      }

      .line {
        width: 160px;
      }

      .button {
        padding: 11px 20px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>THE BRIDGE</h1>
    <p class="subtle">BridgeForensicLogic, LLC</p>
    <p class="subtle">bridge@bridgeforensiclogic.com</p>

    <div class="line"></div>

    <h2>NODE 001 — BASELINE</h2>
    <p>Baseline established. Noise reduced.</p>

    <a class="button" href="#" onclick="revealAccess(); return false;">REQUEST ACCESS</a>

    <div id="access-panel">
      <div class="field">
        <div class="label">Channel</div>
        <div class="value">contact@bridgeforensiclogic.com</div>
      </div>

      <div class="field">
        <div class="label">Action</div>
        <div class="value">
          <a class="action-link" href="mailto:contact@bridgeforensiclogic.com?subject=Request%20Access">Transmit</a>
        </div>
      </div>
    </div>
  </div>

  <script>
    function revealAccess() {
      const panel = document.getElementById('access-panel');
      if (!panel.classList.contains('visible')) {
        panel.classList.add('visible');

        const fields = panel.querySelectorAll('.field');
        fields.forEach((field, index) => {
          setTimeout(() => {
            field.classList.add('visible');
          }, 180 + (index * 180));
        });
      }
    }
  </script>
</body>
</html>
