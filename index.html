<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Bridge</title>
  <style>
    :root {
      --bg: #0b0b0b;
      --fg: #d6b16a;
      --fg-dim: rgba(214, 177, 106, 0.65);
      --line: #6f5829;
      --line-bright: rgba(212, 175, 55, 0.4);
      --line-focus: #d4af37;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: Garamond, Georgia, serif;
    }

    body {
      text-align: center;
      padding: 100px 20px;
    }

    .wrap {
      max-width: 760px;
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 0.75rem;
      font-size: clamp(2.5rem, 6vw, 3.5rem);
      letter-spacing: 0.14em;
      font-weight: normal;
    }

    h2 {
      margin: 2.5rem 0 0.75rem;
      font-size: 1.1rem;
      letter-spacing: 0.12em;
      font-weight: normal;
    }

    p {
      margin: 0.5rem 0;
      font-size: 1rem;
      line-height: 1.6;
      color: var(--fg);
    }

    .subtle {
      color: var(--fg-dim);
      letter-spacing: 0.06em;
    }

    .line {
      margin: 2.5rem auto;
      width: 220px;
      height: 1px;
      background: var(--line);
    }

    a,
    a:visited,
    a:hover,
    a:active {
      color: var(--fg);
      text-decoration: none;
    }

    .button {
      display: inline-block;
      margin-top: 2rem;
      padding: 12px 24px;
      border: 1px solid var(--fg);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      transition: opacity 0.3s ease, border-color 0.3s ease;
      cursor: pointer;
      user-select: none;
    }

    .button:hover {
      opacity: 0.72;
    }

    #access-form {
      max-width: 440px;
      margin: 2.25rem auto 0;
      text-align: left;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.7s ease, transform 0.7s ease;
      pointer-events: none;
      max-height: 0;
      overflow: hidden;
    }

    #access-form.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
      max-height: 1000px;
    }

    .field {
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.55s ease, transform 0.55s ease;
    }

    .field.visible {
      opacity: 1;
      transform: translateY(0);
    }

    #access-form input,
    #access-form textarea {
      width: 100%;
      display: block;
      background: transparent;
      color: var(--fg);
      border: none;
      border-bottom: 1px solid var(--line-bright);
      border-radius: 0;
      outline: none;
      padding: 0.75rem 0;
      margin: 0 0 1.35rem;
      font: inherit;
      font-size: 0.98rem;
      line-height: 1.5;
      appearance: none;
      -webkit-appearance: none;
    }

    #access-form textarea {
      resize: vertical;
      min-height: 90px;
    }

    #access-form input::placeholder,
    #access-form textarea::placeholder {
      color: var(--fg-dim);
      opacity: 1;
      letter-spacing: 0.04em;
    }

    #access-form input:focus,
    #access-form textarea:focus {
      border-bottom-color: var(--line-focus);
    }

    #access-form button {
      background: none;
      border: none;
      border-bottom: 1px solid var(--line-bright);
      color: var(--fg);
      padding: 0 0 2px;
      margin-top: 0.25rem;
      cursor: pointer;
      font: inherit;
      font-size: 0.95rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    #access-form button:hover {
      opacity: 0.72;
    }

    #response-message {
      display: none;
      margin-top: 2.5rem;
      color: var(--fg-dim);
      letter-spacing: 0.08em;
      line-height: 1.8;
    }

    #response-message.visible {
      display: block;
    }

    @media (max-width: 640px) {
      body {
        padding: 72px 18px;
      }

      .line {
        width: 160px;
      }

      .button {
        padding: 11px 20px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>THE BRIDGE</h1>
    <p class="subtle">BridgeForensicLogic, LLC</p>
    <p class="subtle">bridge@bridgeforensiclogic.com</p>

    <div class="line"></div>

    <h2>NODE 001 — BASELINE</h2>
    <p>Baseline established. Noise reduced.</p>

    <a class="button" href="#" onclick="revealForm(); return false;">REQUEST ACCESS</a>

    <div id="access-form">
      <form action="https://formsubmit.co/contact@bridgeforensiclogic.com" method="POST">
        <input type="hidden" name="_subject" value="Request Access">
        <input type="hidden" name="_captcha" value="false">
        <input type="hidden" name="_next" value="https://bridgeforensiclogic.com/?status=received">

        <div class="field">
          <input type="text" name="name" placeholder="Name" required>
        </div>

        <div class="field">
          <input type="email" name="email" placeholder="Email" required>
        </div>

        <div class="field">
          <textarea name="message" placeholder="Message" rows="5" required></textarea>
        </div>

        <div class="field">
          <button type="submit">TRANSMIT</button>
        </div>
      </form>
    </div>

    <div id="response-message">
      SIGNAL RECEIVED<br>
      THE RECORD PERSISTS
    </div>
  </div>

  <script>
    function revealForm() {
      const form = document.getElementById('access-form');
      if (!form.classList.contains('visible')) {
        form.classList.add('visible');

        const fields = form.querySelectorAll('.field');
        fields.forEach((field, index) => {
          setTimeout(() => {
            field.classList.add('visible');
          }, 180 + (index * 180));
        });
      }
    }

    if (window.location.search.includes('status=received')) {
      const msg = document.getElementById('response-message');
      msg.classList.add('visible');
      history.replaceState({}, document.title, window.location.pathname);
    }
  </script>
</body>
</html>
